<div class="page-wrapper space-y-6">
  <div class="flex items-start justify-between gap-4 flex-wrap">
    <div>
      <div class="inline-flex items-center gap-2 rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-800">Agent</div>
      <h1 class="mt-3 text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900">Post New Ad</h1>
      <p class="mt-1 text-sm text-slate-600">Fill in the details below to create a new property listing</p>
    </div>
    <div>
      <a routerLink="/agent/my-listings" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50">← Back to Listings</a>
    </div>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden max-w-3xl">
    <div class="border-b border-slate-100 px-5 py-4">
      <span class="text-base font-bold text-slate-900">Listing Details</span>
    </div>
    <div class="p-6 space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Property Title <span class="text-rose-500">*</span></label>
        <input type="text" [(ngModel)]="form.title" placeholder="e.g. 3 Bedroom Apartment in DHA Lahore" [class.ring-2]="submitted && !form.title.trim()" [class.ring-rose-500]="submitted && !form.title.trim()" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
        <small class="text-rose-600 text-xs mt-1 block" *ngIf="submitted && !form.title.trim()">⚠️ Title is required</small>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea [(ngModel)]="form.description" rows="4" placeholder="Describe the property in detail…" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500"></textarea>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Price (USD) <span class="text-rose-500">*</span></label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400 text-sm">$</span>
            <input type="number" min="1" [(ngModel)]="form.price" placeholder="120000" [class.ring-2]="submitted && form.price <= 0" [class.ring-rose-500]="submitted && form.price <= 0" class="w-full pl-8 rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
          </div>
          <small class="text-rose-600 text-xs mt-1 block" *ngIf="submitted && form.price <= 0">⚠️ Price must be greater than 0</small>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Category <span class="text-rose-500">*</span></label>
          <select [(ngModel)]="form.categoryId" [class.ring-2]="submitted && !form.categoryId" [class.ring-rose-500]="submitted && !form.categoryId" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500">
            <option value="">Select a category…</option>
            <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
          </select>
          <small class="text-rose-600 text-xs mt-1 block" *ngIf="submitted && !form.categoryId">⚠️ Category is required</small>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Location / Address</label>
        <input type="text" [(ngModel)]="form.location" placeholder="e.g. DHA Phase 6, Lahore" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
      </div>
      <div class="flex gap-3 justify-end pt-2">
        <a routerLink="/agent/my-listings" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">Cancel</a>
        <button type="button" (click)="submitListing()" [disabled]="saving" class="inline-flex items-center gap-2 rounded-xl bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700 disabled:opacity-60">
          <div class="spinner" *ngIf="saving" style="width:15px;height:15px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:#fff"></div>
          <svg *ngIf="!saving" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="m5 13 4 4L19 7"/></svg>
          {{ saving ? 'Posting…' : 'Post Listing' }}
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container">
  <div class="toast" [ngClass]="t.type" *ngFor="let t of toasts">{{ t.type === 'success' ? '✅' : '❌' }} {{ t.message }}</div>
</div>
