<div class="page-wrapper space-y-6">
  <div class="flex items-start justify-between gap-4 flex-wrap">
    <div>
      <div class="inline-flex items-center gap-2 rounded-full border border-emerald-200 bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-800">Agent</div>
      <h1 class="mt-3 text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900">My Profile</h1>
      <p class="mt-1 text-sm text-slate-600">Manage your account information</p>
    </div>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-8 text-center" *ngIf="loading">
    <div class="spinner mx-auto"></div>
    <p class="text-slate-600 mt-2">Loading profile…</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-4xl" *ngIf="!loading">
    <div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden lg:col-span-1">
      <div class="border-b border-slate-100 px-5 py-4">
        <span class="text-base font-bold text-slate-900">Profile Overview</span>
      </div>
      <div class="p-6 text-center">
        <div class="w-20 h-20 rounded-full bg-emerald-100 text-emerald-700 text-2xl font-bold flex items-center justify-center mx-auto mb-4">{{ getInitials(profile.fullName) }}</div>
        <div class="text-lg font-extrabold text-slate-900">{{ profile.fullName }}</div>
        <div class="text-sm text-slate-600 mt-1">{{ profile.email }}</div>
        <span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-1 text-xs font-semibold text-emerald-700 mt-2">Agent</span>
        <div class="mt-4 text-xs text-slate-500">License #</div>
        <div class="text-sm font-bold text-slate-900">{{ profile.licenseNumber || '—' }}</div>
      </div>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden lg:col-span-2">
      <div class="border-b border-slate-100 px-5 py-4">
        <span class="text-base font-bold text-slate-900">Edit Information</span>
      </div>
      <div class="p-6 space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
            <input type="text" [(ngModel)]="form.fullName" placeholder="Your full name" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input type="text" [value]="profile.email" disabled class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm text-slate-500 cursor-not-allowed" />
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
            <input type="text" [(ngModel)]="form.phoneNumber" placeholder="+92 300 0000000" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">License Number</label>
            <input type="text" [(ngModel)]="form.licenseNumber" placeholder="RE-12345" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Agency Name</label>
          <input type="text" [(ngModel)]="form.agencyName" placeholder="Your agency or company name" class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
        </div>
        <div class="flex justify-end pt-2">
          <button type="button" (click)="saveProfile()" [disabled]="saving" class="inline-flex items-center gap-2 rounded-xl bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700 disabled:opacity-60">
            <div class="spinner" *ngIf="saving" style="width:15px;height:15px;border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:#fff"></div>
            {{ saving ? 'Saving…' : 'Save Changes' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container">
  <div class="toast" [ngClass]="t.type" *ngFor="let t of toasts">{{ t.type === 'success' ? '✅' : '❌' }} {{ t.message }}</div>
</div>
