<div class="page-wrapper">
  <div class="accent-bar"></div>
  <div class="page-header">
    <div class="page-title-block">
      <h1>Change Password</h1>
      <p>Update your admin account password</p>
    </div>
  </div>

  <div class="pw-card">
    <div class="pw-icon">🔒</div>
    <h2>Secure your account</h2>
    <p>Choose a strong password with at least 8 characters</p>

    <form class="pw-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Current Password</label>
        <div class="pw-field">
          <input class="form-control" [type]="show.current ? 'text' : 'password'"
            [(ngModel)]="form.currentPassword" name="current" placeholder="••••••••" />
          <button type="button" class="pw-eye" (click)="show.current = !show.current">
            {{ show.current ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div class="pw-field">
          <input class="form-control" [type]="show.new ? 'text' : 'password'"
            [(ngModel)]="form.newPassword" name="newpw" placeholder="••••••••" />
          <button type="button" class="pw-eye" (click)="show.new = !show.new">
            {{ show.new ? '🙈' : '👁️' }}
          </button>
        </div>
        <!-- Strength bar -->
        <div class="strength-bar" *ngIf="form.newPassword">
          <div class="strength-fill" [style.width.%]="strength.pct" [style.background]="strength.color"></div>
        </div>
        <small class="strength-label" *ngIf="form.newPassword" [style.color]="strength.color">{{ strength.label }}</small>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="pw-field">
          <input class="form-control" [type]="show.confirm ? 'text' : 'password'"
            [(ngModel)]="form.confirmPassword" name="confirm" placeholder="••••••••" />
          <button type="button" class="pw-eye" (click)="show.confirm = !show.confirm">
            {{ show.confirm ? '🙈' : '👁️' }}
          </button>
        </div>
        <small class="mismatch" *ngIf="form.confirmPassword && form.newPassword !== form.confirmPassword">
          ⚠️ Passwords do not match
        </small>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px"
        [disabled]="saving || form.newPassword !== form.confirmPassword">
        <div class="spinner" *ngIf="saving" style="width:16px;height:16px;border-width:2px"></div>
        {{ saving ? 'Changing…' : 'Change Password' }}
      </button>
    </form>
  </div>
</div>

<div class="toast-container">
  <div class="toast" [ngClass]="t.type" *ngFor="let t of toasts">{{ t.type === 'success' ? '✅' : '❌' }} {{ t.message }}</div>
</div>
